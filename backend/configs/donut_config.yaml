model:
  pretrained_model_name_or_path: naver-clova-ix/donut-base
  task_start_token: <s_receipt>
  prompt_end_token: <s_receipt>
  image_height: 960
  image_width: 960
  max_length: 512
  num_beams: 1
  sort_json_keys: false

dataset:
  train_split: train
  validation_split: validation
  images_subdir: images
  metadata_filename: metadata.jsonl
  max_train_samples: 0
  max_validation_samples: 0
  verify_images: true

training:
  output_dir: models/donut_receipt_model
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 2
  learning_rate: 3.0e-5
  num_train_epochs: 10
  warmup_steps: 100
  gradient_accumulation_steps: 2
  weight_decay: 0.01
  logging_steps: 10
  save_total_limit: 2
  dataloader_num_workers: 4
  seed: 42
  gradient_checkpointing: false

export:
  opset: 17
  output_file: donut_receipt.onnx
  quantized_output_file: donut_receipt.int8.onnx
