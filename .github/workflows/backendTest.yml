name: Backend Tests

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: splitscan
          POSTGRES_USER: splitscan_user
          POSTGRES_PASSWORD: splitscan_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U splitscan_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('Backend/pom.xml') }}

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw test